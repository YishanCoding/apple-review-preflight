<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F5F1E8"/>
  <rect x="56" y="48" width="1088" height="664" rx="28" fill="#FFFDF8" stroke="#1C1A17" stroke-width="2"/>
  <text x="88" y="102" fill="#1C1A17" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700">
    Apple Review Preflight
  </text>
  <text x="88" y="136" fill="#5E584F" font-family="Helvetica, Arial, sans-serif" font-size="20">
    Submission compliance workflow: discover → review → verify → update
  </text>

  <rect x="88" y="176" width="240" height="200" rx="24" fill="#F6D8AE" stroke="#1C1A17" stroke-width="2"/>
  <text x="112" y="218" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">1. Discover</text>
  <text x="112" y="254" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="19">tools/preflight-scan.sh</text>
  <text x="112" y="286" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Detects:</text>
  <text x="112" y="314" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Info.plist / PrivacyInfo.xcprivacy</text>
  <text x="112" y="340" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Targets / extensions / package markers</text>
  <text x="112" y="366" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Dependencies that imply review risk</text>

  <rect x="352" y="176" width="240" height="200" rx="24" fill="#D6E8C8" stroke="#1C1A17" stroke-width="2"/>
  <text x="376" y="218" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">2. Review</text>
  <text x="376" y="254" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="19">checks/ + by-app-type/</text>
  <text x="376" y="286" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Failure map</text>
  <text x="376" y="312" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Privacy consistency</text>
  <text x="376" y="338" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Required reason APIs</text>
  <text x="376" y="364" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Platform and app-type checklists</text>

  <rect x="616" y="176" width="240" height="200" rx="24" fill="#D3E4F7" stroke="#1C1A17" stroke-width="2"/>
  <text x="640" y="218" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">3. Verify</text>
  <text x="640" y="254" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="19">Evidence-backed output</text>
  <text x="640" y="286" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Scope</text>
  <text x="640" y="312" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Findings</text>
  <text x="640" y="338" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Missing inputs</text>
  <text x="640" y="364" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Final recommendation</text>

  <rect x="880" y="176" width="232" height="200" rx="24" fill="#F4D6D6" stroke="#1C1A17" stroke-width="2"/>
  <text x="904" y="218" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="700">4. Update</text>
  <text x="904" y="254" fill="#1C1A17" font-family="Helvetica, Arial, sans-serif" font-size="19">policy/ workflow</text>
  <text x="904" y="286" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Check live Apple sources first</text>
  <text x="904" y="312" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Use Wayback as diff helper</text>
  <text x="904" y="338" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Record changes in the log</text>
  <text x="904" y="364" fill="#4B4339" font-family="Helvetica, Arial, sans-serif" font-size="17">Sync source-map references</text>

  <path d="M328 276H352" stroke="#1C1A17" stroke-width="3"/>
  <path d="M592 276H616" stroke="#1C1A17" stroke-width="3"/>
  <path d="M856 276H880" stroke="#1C1A17" stroke-width="3"/>

  <rect x="88" y="428" width="1024" height="228" rx="24" fill="#1C1A17"/>
  <text x="120" y="474" fill="#FFF8EE" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700">
    What changed in this version
  </text>
  <text x="120" y="516" fill="#FFF8EE" font-family="Helvetica, Arial, sans-serif" font-size="20">
    • Step 1 no longer assumes one fixed iOS path
  </text>
  <text x="120" y="548" fill="#FFF8EE" font-family="Helvetica, Arial, sans-serif" font-size="20">
    • Manifest checks now cover app bundles, clips, widgets, and extensions
  </text>
  <text x="120" y="580" fill="#FFF8EE" font-family="Helvetica, Arial, sans-serif" font-size="20">
    • README now describes policy tracking accurately: live-source review + Wayback-assisted diff
  </text>
  <text x="120" y="612" fill="#FFF8EE" font-family="Helvetica, Arial, sans-serif" font-size="20">
    • Maintenance docs now run from the repo root instead of a personal path
  </text>
</svg>
